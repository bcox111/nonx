<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }
        /* Remove blue tap flash on mobile */
        * { -webkit-tap-highlight-color: transparent; }
        /* Eliminate 300ms tap delay on controls */
        .leaflet-control { touch-action: manipulation; }
        /* Ensure controls respect iPhone notch / safe areas */
        .leaflet-top { padding-top: env(safe-area-inset-top, 0); }
        .leaflet-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
        .leaflet-left { padding-left: env(safe-area-inset-left, 0); }
        .leaflet-right { padding-right: env(safe-area-inset-right, 0); }

        /* --- Desktop controls --- */
        .padus-control {
            background: white;
            padding: 6px 8px;
            border-radius: 4px;
            font: 12px/1.5 Arial, sans-serif;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        .padus-control label {
            display: block;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .padus-control select {
            width: 200px;
        }
        .padus-legend {
            background: white;
            padding: 6px 8px;
            border-radius: 4px;
            font: 12px/1.6 Arial, sans-serif;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            max-height: 300px;
            overflow-y: auto;
        }
        .padus-legend b { display: block; margin-bottom: 2px; }
        .padus-legend i {
            display: inline-block;
            width: 13px;
            height: 13px;
            margin-right: 5px;
            vertical-align: middle;
            border: 1px solid #666;
            opacity: 0.85;
        }

        /* --- Locate (Find Me) button --- */
        .locate-btn {
            background: white;
            border: none;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            min-width: 44px;
            min-height: 44px;
            font-size: 20px;
            padding: 0;
        }
        .locate-btn:hover { background: #f4f4f4; }
        .locate-btn:active { background: #e8e8e8; }

        /* --- Mobile bottom sheet --- */
        .layers-fab {
            display: none; /* shown via media query */
            position: fixed;
            bottom: calc(80px + env(safe-area-inset-bottom, 0px));
            left: 10px;
            z-index: 1000;
            background: white;
            border: none;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            cursor: pointer;
            font: bold 13px/1 Arial, sans-serif;
            padding: 10px 14px;
            min-height: 44px;
            touch-action: manipulation;
        }
        .bottom-sheet {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2000;
            background: white;
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.25);
            padding: 16px 16px calc(16px + env(safe-area-inset-bottom, 0px));
            max-height: 60vh;
            overflow-y: auto;
            font: 14px/1.6 Arial, sans-serif;
        }
        .bottom-sheet.open { display: block; }
        .bottom-sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .bottom-sheet-header b { font-size: 15px; }
        .bottom-sheet-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 22px;
            line-height: 1;
            padding: 4px 8px;
            min-width: 44px;
            min-height: 44px;
            touch-action: manipulation;
        }
        .bottom-sheet select {
            width: 100%;
            font-size: 16px; /* prevents iOS auto-zoom */
            padding: 8px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .sheet-legend i {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 6px;
            vertical-align: middle;
            border: 1px solid #666;
            opacity: 0.85;
        }
        .sheet-legend b { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
        /* Dim overlay behind sheet */
        .sheet-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1999;
            background: rgba(0,0,0,0.35);
        }
        .sheet-backdrop.open { display: block; }

        /* --- Mobile overrides --- */
        @media (max-width: 768px) {
            /* Hide desktop PADUS controls on mobile */
            .padus-control,
            .padus-legend { display: none !important; }
            /* Show FAB */
            .layers-fab { display: flex; align-items: center; gap: 6px; }
            /* Larger leaflet control buttons */
            .leaflet-control-zoom a,
            .leaflet-control-layers-toggle {
                width: 44px !important;
                height: 44px !important;
                line-height: 44px !important;
                font-size: 20px !important;
            }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Mobile: floating layers button + bottom sheet -->
    <button class="layers-fab" id="layersFab">
        <span>&#9776;</span> Layers
    </button>
    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <div class="bottom-sheet" id="bottomSheet">
        <div class="bottom-sheet-header">
            <b>PAD-US Layer</b>
            <button class="bottom-sheet-close" id="sheetClose">&#215;</button>
        </div>
        <select id="sheetSelect"></select>
        <div class="sheet-legend" id="sheetLegend"></div>
    </div>

    <script>
        var map = L.map('map', {
            tap: true,
            tapTolerance: 15,
            bounceAtZoomLimits: false
        }).setView([46.0187, -91.47588], 4);

        var TILE_OPTS = { keepBuffer: 2, updateWhenZooming: false };

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', Object.assign({
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            detectRetina: true
        }, TILE_OPTS)).addTo(map);

        var cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', Object.assign({
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd'
        }, TILE_OPTS));

        var cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', Object.assign({
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd'
        }, TILE_OPTS));

        var esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', Object.assign({
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        }, TILE_OPTS));

        var esriTopo = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', Object.assign({
            attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ, TomTom, Intermap, iPC, USGS, FAO, NPS, NRCAN, GeoBase, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community'
        }, TILE_OPTS));

        var openTopo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', Object.assign({
            attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)',
            maxZoom: 17
        }, TILE_OPTS));

        var ZOOM_MIN = 7;    // show PADUS starting here
        var ZOOM_COUNTY = 10; // show all features (including small) at county level

        var padusEnabled = true;

        var PADUS_BASE = 'https://services.arcgis.com/v01gqwM5QqNysAAi/arcgis/rest/services/';

        // Per-service symbology: which field to color by + color/label per value
        var PADUS_CONFIG = {
            'Manager_Name_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'BLM':  '#D4AC0D', 'USFS': '#2D6A4F', 'NPS':  '#52B788',
                    'FWS':  '#74C69D', 'USBR': '#457B9D', 'BIA':  '#A0522D',
                    'DOD':  '#6C757D', 'ARMY': '#4B5320', 'NAVY': '#000080',
                    'USAF': '#4169E1', 'DOE':  '#E76F51', 'EPA':  '#00CED1'
                },
                labels: {
                    'BLM':  'Bureau of Land Mgmt', 'USFS': 'US Forest Service',
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USBR': 'Bureau of Reclamation', 'BIA': 'Bureau of Indian Affairs',
                    'DOD':  'Dept of Defense', 'ARMY': 'US Army',
                    'NAVY': 'US Navy', 'USAF': 'US Air Force',
                    'DOE':  'Dept of Energy', 'EPA': 'EPA'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other'
            },
            'PADUS_Protection_Status_by_GAP_Status_Code': {
                styleField: 'GAP_Sts',
                colors: { '1': '#1A6400', '2': '#56A81D', '3': '#D6D600', '4': '#BBBBBB' },
                labels: {
                    '1': 'Status 1 – Biodiversity managed (disturbance allowed)',
                    '2': 'Status 2 – Biodiversity managed (disturbance suppressed)',
                    '3': 'Status 3 – Multiple use / extractive allowed',
                    '4': 'Status 4 – No known protection mandate'
                },
                defaultColor: '#999999', defaultLabel: 'Unknown'
            },
            'PADUS_Public_Access': {
                styleField: 'Access',
                colors: { 'OA': '#4DAC26', 'RA': '#F1A340', 'XA': '#D7191C', 'UK': '#AAAAAA' },
                labels: {
                    'OA': 'Open Access', 'RA': 'Restricted Access',
                    'XA': 'Closed – No Public Access', 'UK': 'Unknown'
                },
                defaultColor: '#AAAAAA', defaultLabel: 'Unknown'
            },
            'Fee_Managers_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'BLM':  '#D4AC0D', 'USFS': '#2D6A4F', 'NPS':  '#52B788',
                    'FWS':  '#74C69D', 'USBR': '#457B9D', 'BIA':  '#A0522D',
                    'DOD':  '#6C757D', 'ARMY': '#4B5320', 'NAVY': '#000080',
                    'USAF': '#4169E1', 'DOE':  '#E76F51'
                },
                labels: {
                    'BLM':  'Bureau of Land Mgmt', 'USFS': 'US Forest Service',
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USBR': 'Bureau of Reclamation', 'BIA': 'Bureau of Indian Affairs',
                    'DOD':  'Dept of Defense', 'ARMY': 'US Army',
                    'NAVY': 'US Navy', 'USAF': 'US Air Force', 'DOE': 'Dept of Energy'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other'
            },
            'Manager_Type_PADUS': {
                styleField: 'Mang_Type',
                colors: {
                    'FED':  '#2166AC', 'STAT': '#4DAC26', 'LOC':  '#FDAE61',
                    'NGO':  '#9970AB', 'PVT':  '#F0F0F0', 'DIST': '#80CDC1',
                    'JNT':  '#A6611A', 'UNK':  '#CCCCCC'
                },
                labels: {
                    'FED':  'Federal', 'STAT': 'State', 'LOC':  'Local Government',
                    'NGO':  'Non-Governmental Org', 'PVT':  'Private',
                    'DIST': 'Special District', 'JNT':  'Joint', 'UNK':  'Unknown'
                },
                defaultColor: '#CCCCCC', defaultLabel: 'Unknown'
            },
            'Federal_Fee_Managers_Authoritative_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'BLM':  '#D4AC0D', 'USFS': '#2D6A4F', 'NPS':  '#52B788',
                    'FWS':  '#74C69D', 'USBR': '#457B9D', 'BIA':  '#A0522D',
                    'DOD':  '#6C757D', 'ARMY': '#4B5320', 'NAVY': '#000080',
                    'USAF': '#4169E1', 'DOE':  '#E76F51', 'EPA':  '#00CED1'
                },
                labels: {
                    'BLM':  'Bureau of Land Mgmt', 'USFS': 'US Forest Service',
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USBR': 'Bureau of Reclamation', 'BIA': 'Bureau of Indian Affairs',
                    'DOD':  'Dept of Defense', 'ARMY': 'US Army',
                    'NAVY': 'US Navy', 'USAF': 'US Air Force',
                    'DOE':  'Dept of Energy', 'EPA':  'EPA'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other Federal'
            },
            'Federal_Management_Agencies_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'BLM':  '#D4AC0D', 'USFS': '#2D6A4F', 'NPS':  '#52B788',
                    'FWS':  '#74C69D', 'USBR': '#457B9D', 'BIA':  '#A0522D',
                    'DOD':  '#6C757D', 'ARMY': '#4B5320', 'NAVY': '#000080',
                    'USAF': '#4169E1', 'DOE':  '#E76F51', 'EPA':  '#00CED1'
                },
                labels: {
                    'BLM':  'Bureau of Land Mgmt', 'USFS': 'US Forest Service',
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USBR': 'Bureau of Reclamation', 'BIA': 'Bureau of Indian Affairs',
                    'DOD':  'Dept of Defense', 'ARMY': 'US Army',
                    'NAVY': 'US Navy', 'USAF': 'US Air Force',
                    'DOE':  'Dept of Energy', 'EPA':  'EPA'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other Federal'
            },
            'Protection_Mechanism_Category_PADUS': {
                styleField: 'Category',
                colors: {
                    'Fee':          '#2B83BA', 'Designation':  '#ABDDA4',
                    'Easement':     '#FDAE61', 'Marine':       '#053061',
                    'Proclamation': '#D7191C'
                },
                labels: {
                    'Fee':          'Fee (Ownership)', 'Designation':  'Designation',
                    'Easement':     'Conservation Easement', 'Marine': 'Marine',
                    'Proclamation': 'Proclamation / Planning'
                },
                defaultColor: '#AAAAAA', defaultLabel: 'Other'
            },
            'Proclamation_and_Other_Planning_Boundaries_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'NPS':  '#52B788', 'FWS':  '#74C69D', 'USFS': '#2D6A4F',
                    'DOD':  '#6C757D', 'BLM':  '#D4AC0D', 'USBR': '#457B9D'
                },
                labels: {
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USFS': 'US Forest Service', 'DOD': 'Dept of Defense',
                    'BLM':  'Bureau of Land Mgmt', 'USBR': 'Bureau of Reclamation'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other'
            }
        };

        var PADUS_SERVICES = {
            'Manager Name':               'Manager_Name_PADUS',
            'Protection Status (GAP)':    'PADUS_Protection_Status_by_GAP_Status_Code',
            'Public Access':              'PADUS_Public_Access',
            'Fee Managers':               'Fee_Managers_PADUS',
            'Manager Type':               'Manager_Type_PADUS',
            'Federal Fee Managers':       'Federal_Fee_Managers_Authoritative_PADUS',
            'Federal Management Agencies':'Federal_Management_Agencies_PADUS',
            'Protection Mechanism':       'Protection_Mechanism_Category_PADUS',
            'Proclamation Boundaries':    'Proclamation_and_Other_Planning_Boundaries_PADUS'
        };

        function createPadusLayer(serviceName) {
            var cfg = PADUS_CONFIG[serviceName] || {};
            var layer = L.esri.featureLayer({
                url: PADUS_BASE + serviceName + '/FeatureServer/0',
                renderer: L.canvas(),
                simplifyFactor: 0.35,
                precision: 5,
                style: function(feature) {
                    var val = cfg.styleField ? feature.properties[cfg.styleField] : null;
                    var color = (cfg.colors && val && cfg.colors[val]) ? cfg.colors[val] : (cfg.defaultColor || '#888888');
                    return { color: '#444', weight: 0.5, fillColor: color, fillOpacity: 0.65 };
                }
            });
            layer.bindPopup(function(l) {
                var p = l.feature.properties;
                var rows = [];
                if (p.Unit_Nm) rows.push('<b>' + p.Unit_Nm + '</b>');
                Object.keys(p).forEach(function(k) {
                    if (k !== 'Unit_Nm' && k !== 'OBJECTID' && p[k] != null && p[k] !== '') {
                        rows.push(k + ': ' + p[k]);
                    }
                });
                return rows.join('<br>') || 'No information available';
            }, { maxWidth: 280 });
            return layer;
        }

        var padusLayer = createPadusLayer('Manager_Name_PADUS');

        function updatePadusLayer() {
            var zoom = map.getZoom();

            if (!padusEnabled || zoom < ZOOM_MIN) {
                if (map.hasLayer(padusLayer)) map.removeLayer(padusLayer);
                return;
            }

            if (!map.hasLayer(padusLayer)) padusLayer.addTo(map);

            // At regional/state zoom: filter to federal and state lands only (larger features)
            // At county zoom: show everything including small local features
            if (zoom < ZOOM_COUNTY) {
                padusLayer.setWhere("Mang_Type IN ('FED', 'STAT')");
            } else {
                padusLayer.setWhere("1=1");
            }
        }

        map.on('zoomend', updatePadusLayer);

        // Empty layer group acts as proxy in the layer control
        var padusProxy = L.layerGroup().addTo(map);

        map.on('overlayadd', function(e) {
            if (e.layer === padusProxy) {
                padusEnabled = true;
                updatePadusLayer();
            }
        });

        map.on('overlayremove', function(e) {
            if (e.layer === padusProxy) {
                padusEnabled = false;
                if (map.hasLayer(padusLayer)) map.removeLayer(padusLayer);
            }
        });

        L.control.layers(
            {
                'OpenStreetMap': osm,
                'CartoDB Light': cartoLight,
                'CartoDB Dark': cartoDark,
                'ESRI Satellite': esriSatellite,
                'ESRI Topo': esriTopo,
                'OpenTopoMap': openTopo
            },
            { 'PADUS': padusProxy }
        ).addTo(map);

        var LegendControl = L.Control.extend({
            onAdd: function() {
                this._div = L.DomUtil.create('div', 'padus-legend');
                return this._div;
            },
            update: function(serviceName) {
                var cfg = PADUS_CONFIG[serviceName];
                if (!cfg || !cfg.colors) { this._div.innerHTML = ''; return; }
                var html = '<b>' + cfg.styleField + '</b><br>';
                Object.keys(cfg.colors).forEach(function(val) {
                    html += '<i style="background:' + cfg.colors[val] + '"></i>' + (cfg.labels[val] || val) + '<br>';
                });
                if (cfg.defaultLabel) {
                    html += '<i style="background:' + cfg.defaultColor + '"></i>' + cfg.defaultLabel;
                }
                this._div.innerHTML = html;
            }
        });
        var legend = new LegendControl({ position: 'bottomleft' }).addTo(map);
        legend.update('Manager_Name_PADUS');

        function swapPadusLayer(serviceName) {
            if (map.hasLayer(padusLayer)) map.removeLayer(padusLayer);
            padusLayer = createPadusLayer(serviceName);
            legend.update(serviceName);
            updatePadusLayer();
        }

        var PadusControl = L.Control.extend({
            onAdd: function(map) {
                var div = L.DomUtil.create('div', 'padus-control');
                var label = L.DomUtil.create('label', '', div);
                label.textContent = 'PAD-US Layer:';
                var select = L.DomUtil.create('select', '', div);
                Object.keys(PADUS_SERVICES).forEach(function(name) {
                    var opt = L.DomUtil.create('option', '', select);
                    opt.value = PADUS_SERVICES[name];
                    opt.textContent = name;
                });
                L.DomEvent.disableClickPropagation(div);
                L.DomEvent.on(select, 'change', function() {
                    swapPadusLayer(select.value);
                });
                return div;
            }
        });
        new PadusControl({ position: 'topright' }).addTo(map);

        updatePadusLayer();

        // --- GPS "Find Me" control ---
        var locateMarker = null;
        var locateCircle = null;

        L.Control.Locate = L.Control.extend({
            onAdd: function() {
                var btn = L.DomUtil.create('button', 'locate-btn');
                btn.title = 'Find my location';
                btn.innerHTML = '&#8982;';
                btn.setAttribute('aria-label', 'Find my location');
                L.DomEvent.disableClickPropagation(btn);
                L.DomEvent.on(btn, 'click', function() {
                    if (!navigator.geolocation) {
                        alert('Geolocation is not supported by your browser.');
                        return;
                    }
                    btn.style.opacity = '0.5';
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            btn.style.opacity = '1';
                            var lat = pos.coords.latitude;
                            var lng = pos.coords.longitude;
                            var acc = pos.coords.accuracy;
                            if (locateMarker) map.removeLayer(locateMarker);
                            if (locateCircle) map.removeLayer(locateCircle);
                            locateCircle = L.circle([lat, lng], { radius: acc, color: '#1a73e8', weight: 1, fillOpacity: 0.1 }).addTo(map);
                            locateMarker = L.circleMarker([lat, lng], { radius: 8, color: '#1a73e8', fillColor: '#1a73e8', fillOpacity: 1, weight: 2 }).addTo(map);
                            map.flyTo([lat, lng], Math.max(map.getZoom(), 12));
                        },
                        function(err) {
                            btn.style.opacity = '1';
                            var msg = { 1: 'Location access denied.', 2: 'Location unavailable.', 3: 'Location request timed out.' };
                            alert(msg[err.code] || 'Could not get location.');
                        },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                });
                return btn;
            }
        });
        new L.Control.Locate({ position: 'bottomright' }).addTo(map);

        // --- Mobile bottom sheet ---
        var sheetSelect = document.getElementById('sheetSelect');
        var sheetLegend = document.getElementById('sheetLegend');
        var bottomSheet = document.getElementById('bottomSheet');
        var backdrop = document.getElementById('sheetBackdrop');

        // Populate sheet select with same options as desktop
        Object.keys(PADUS_SERVICES).forEach(function(name) {
            var opt = document.createElement('option');
            opt.value = PADUS_SERVICES[name];
            opt.textContent = name;
            sheetSelect.appendChild(opt);
        });

        function updateSheetLegend(serviceName) {
            var cfg = PADUS_CONFIG[serviceName];
            if (!cfg || !cfg.colors) { sheetLegend.innerHTML = ''; return; }
            var html = '<b>' + cfg.styleField + '</b><br>';
            Object.keys(cfg.colors).forEach(function(val) {
                html += '<i style="background:' + cfg.colors[val] + '"></i>' + (cfg.labels[val] || val) + '<br>';
            });
            if (cfg.defaultLabel) {
                html += '<i style="background:' + cfg.defaultColor + '"></i>' + cfg.defaultLabel;
            }
            sheetLegend.innerHTML = html;
        }
        updateSheetLegend('Manager_Name_PADUS');

        sheetSelect.addEventListener('change', function() {
            swapPadusLayer(sheetSelect.value);
            updateSheetLegend(sheetSelect.value);
        });

        function openSheet() {
            bottomSheet.classList.add('open');
            backdrop.classList.add('open');
        }
        function closeSheet() {
            bottomSheet.classList.remove('open');
            backdrop.classList.remove('open');
        }

        document.getElementById('layersFab').addEventListener('click', openSheet);
        document.getElementById('sheetClose').addEventListener('click', closeSheet);
        backdrop.addEventListener('click', closeSheet);
    </script>
</body>
</html>
