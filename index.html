<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 280px;
            right: 0;
        }
        /* Remove blue tap flash on mobile */
        * { -webkit-tap-highlight-color: transparent; }
        /* Eliminate 300ms tap delay on controls */
        .leaflet-control { touch-action: manipulation; }
        /* Ensure controls respect iPhone notch / safe areas */
        .leaflet-top { padding-top: env(safe-area-inset-top, 0); }
        .leaflet-bottom { padding-bottom: env(safe-area-inset-bottom, 0); }
        .leaflet-left { padding-left: env(safe-area-inset-left, 0); }
        .leaflet-right { padding-right: env(safe-area-inset-right, 0); }

        /* --- Locate (Find Me) button --- */
        .locate-btn {
            background: white;
            border: none;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            min-width: 44px;
            min-height: 44px;
            font-size: 20px;
            padding: 0;
        }
        .locate-btn:hover { background: #f4f4f4; }
        .locate-btn:active { background: #e8e8e8; }

        /* --- Sidebar --- */
        #sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 280px;
            z-index: 1000;
            background: white;
            box-shadow: 2px 0 8px rgba(0,0,0,0.2);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            font: 13px/1.5 Arial, sans-serif;
        }
        #sidebar:not(.open) {
            display: none;
        }
        body.sidebar-closed #map {
            left: 0;
        }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 12px 8px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }
        .sidebar-title { font-weight: bold; font-size: 14px; }
        .sidebar-close-btn {
            background: none; border: none; cursor: pointer;
            font-size: 20px; line-height: 1; padding: 4px 6px;
            color: #555; min-width: 32px; min-height: 32px;
        }
        .sidebar-section {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .sidebar-section-title {
            font-weight: bold; font-size: 11px; text-transform: uppercase;
            color: #888; letter-spacing: 0.5px; margin-bottom: 8px;
        }
        .basemap-label {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 0; cursor: pointer;
        }
        .sidebar-layer-row {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 0; cursor: pointer; margin-bottom: 8px;
        }
        #padusSelect {
            width: 100%; font-size: 13px; padding: 5px 6px;
            border: 1px solid #ccc; border-radius: 4px;
        }
        #sidebarLegend i {
            display: inline-block; width: 13px; height: 13px;
            margin-right: 5px; vertical-align: middle;
            border: 1px solid #666; opacity: 0.85;
        }
        #sidebarLegend .legend-field {
            display: block; font-size: 11px; color: #555;
            margin-bottom: 4px; font-weight: bold;
        }

        /* --- Search --- */
        .search-row {
            display: flex; gap: 6px; margin-bottom: 4px;
        }
        #searchInput {
            flex: 1; font-size: 13px; padding: 5px 8px;
            border: 1px solid #ccc; border-radius: 4px;
            min-width: 0;
        }
        #searchBtn {
            background: white; border: 1px solid #ccc; border-radius: 4px;
            cursor: pointer; padding: 5px 9px; font-size: 15px;
            flex-shrink: 0; line-height: 1;
        }
        #searchBtn:hover { background: #f4f4f4; }
        #searchResults { font-size: 12px; color: #333; }
        .search-result-item {
            padding: 5px 4px; cursor: pointer; border-radius: 3px; line-height: 1.3;
        }
        .search-result-item:hover { background: #f0f0f0; }
        .search-no-results { color: #888; font-style: italic; padding: 4px; }

        /* --- Sidebar open button --- */
        #sidebarOpenBtn {
            display: none;
            position: fixed; top: 10px; left: 10px; z-index: 1001;
            background: white; border: none; border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            cursor: pointer; font: bold 13px/1 Arial, sans-serif;
            padding: 10px 14px; min-height: 44px; gap: 6px;
            align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        body.sidebar-closed #sidebarOpenBtn { display: flex; }

        /* --- Mobile --- */
        @media (max-width: 768px) {
            #searchInput { font-size: 16px; }
            #sidebar {
                width: 100%;
                right: 0;
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }
            #map { left: 0 !important; }
            #sidebarOpenBtn {
                top: 10px;
                bottom: auto;
                left: 10px;
                width: auto; height: auto;
                padding: 10px 14px;
                min-height: 44px;
                font: bold 13px/1 Arial, sans-serif;
                gap: 6px;
            }
            body:not(.sidebar-closed) #sidebarOpenBtn { display: none; }
            .leaflet-control-zoom a {
                width: 44px !important; height: 44px !important;
                line-height: 44px !important; font-size: 20px !important;
            }
            body:not(.sidebar-closed) .leaflet-control-zoom,
            body:not(.sidebar-closed) .locate-btn {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar" class="open">
        <div class="sidebar-header">
            <span class="sidebar-title">Layers</span>
            <button id="sidebarCloseBtn" class="sidebar-close-btn" aria-label="Close sidebar">&#215;</button>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Search</div>
            <div class="search-row">
                <input type="search" id="searchInput" placeholder="City, address, or lat, lng&hellip;" autocomplete="off" />
                <button id="searchBtn" aria-label="Search">&#128269;</button>
            </div>
            <div id="searchResults"></div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Basemap</div>
            <div id="basemapList"></div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Layers</div>
            <label class="sidebar-layer-row">
                <input type="checkbox" id="padusCheck"> PAD-US
            </label>
            <select id="padusSelect"></select>
            <label class="sidebar-layer-row" style="margin-top:8px;">
                <input type="checkbox" id="troutCheck"> Trout Streams (WI)
            </label>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-title">Legend</div>
            <div id="sidebarLegend"></div>
            <div id="troutLegend" style="display:none; margin-top:8px;">
                <span class="legend-field">TROUT_CLASS_CODE</span>
                <div><i style="background:#1a6faf"></i>Class I</div>
                <div><i style="background:#4dac26"></i>Class II</div>
                <div><i style="background:#f1a340"></i>Class III</div>
            </div>
        </div>
    </div>

    <button id="sidebarOpenBtn" aria-label="Open layers panel">&#9776; Layers</button>

    <div id="map"></div>

    <script>
        var map = L.map('map', {
            tap: true,
            tapTolerance: 15,
            bounceAtZoomLimits: false,
            zoomControl: false
        }).setView([46.0187, -91.47588], 4);

        L.control.zoom({ position: 'topright' }).addTo(map);

        var TILE_OPTS = { keepBuffer: 2, updateWhenZooming: false };

        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', Object.assign({
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            detectRetina: true
        }, TILE_OPTS)).addTo(map);

        var cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', Object.assign({
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd'
        }, TILE_OPTS));

        var cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', Object.assign({
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd'
        }, TILE_OPTS));

        var esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', Object.assign({
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        }, TILE_OPTS));

        var esriHybrid = L.layerGroup([
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', Object.assign({
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            }, TILE_OPTS)),
            L.tileLayer('https://services.arcgisonline.com/arcgis/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', TILE_OPTS)
        ]);

        var esriTopo = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', Object.assign({
            attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ, TomTom, Intermap, iPC, USGS, FAO, NPS, NRCAN, GeoBase, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), and the GIS User Community'
        }, TILE_OPTS));

        var openTopo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', Object.assign({
            attribution: 'Map data: &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, <a href="http://viewfinderpanoramas.org">SRTM</a> | Map style: &copy; <a href="https://opentopomap.org">OpenTopoMap</a> (<a href="https://creativecommons.org/licenses/by-sa/3.0/">CC-BY-SA</a>)',
            maxZoom: 17
        }, TILE_OPTS));

        var BASEMAPS = {
            'OpenStreetMap': osm,
            'CartoDB Light': cartoLight,
            'CartoDB Dark': cartoDark,
            'ESRI Satellite': esriSatellite,
            'ESRI Hybrid': esriHybrid,
            'ESRI Topo': esriTopo,
            'OpenTopoMap': openTopo
        };
        var currentBasemap = osm;

        // Build basemap radio buttons
        var basemapList = document.getElementById('basemapList');
        Object.keys(BASEMAPS).forEach(function(name) {
            var lbl = document.createElement('label');
            lbl.className = 'basemap-label';
            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'basemap';
            radio.value = name;
            if (BASEMAPS[name] === currentBasemap) radio.checked = true;
            radio.addEventListener('change', function() {
                if (map.hasLayer(currentBasemap)) map.removeLayer(currentBasemap);
                currentBasemap = BASEMAPS[name];
                currentBasemap.addTo(map);
                currentBasemap.bringToBack();
            });
            lbl.appendChild(radio);
            lbl.appendChild(document.createTextNode(name));
            basemapList.appendChild(lbl);
        });

        var ZOOM_MIN = 7;
        var ZOOM_COUNTY = 10;

        var padusEnabled = false;

        var PADUS_BASE = 'https://services.arcgis.com/v01gqwM5QqNysAAi/arcgis/rest/services/';

        var PADUS_CONFIG = {
            'Manager_Name_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'BLM':  '#D4AC0D', 'USFS': '#2D6A4F', 'NPS':  '#52B788',
                    'FWS':  '#74C69D', 'USBR': '#457B9D', 'BIA':  '#A0522D',
                    'DOD':  '#6C757D', 'ARMY': '#4B5320', 'NAVY': '#000080',
                    'USAF': '#4169E1', 'DOE':  '#E76F51', 'EPA':  '#00CED1'
                },
                labels: {
                    'BLM':  'Bureau of Land Mgmt', 'USFS': 'US Forest Service',
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USBR': 'Bureau of Reclamation', 'BIA': 'Bureau of Indian Affairs',
                    'DOD':  'Dept of Defense', 'ARMY': 'US Army',
                    'NAVY': 'US Navy', 'USAF': 'US Air Force',
                    'DOE':  'Dept of Energy', 'EPA': 'EPA'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other'
            },
            'PADUS_Protection_Status_by_GAP_Status_Code': {
                styleField: 'GAP_Sts',
                colors: { '1': '#1A6400', '2': '#56A81D', '3': '#D6D600', '4': '#BBBBBB' },
                labels: {
                    '1': 'Status 1 – Biodiversity managed (disturbance allowed)',
                    '2': 'Status 2 – Biodiversity managed (disturbance suppressed)',
                    '3': 'Status 3 – Multiple use / extractive allowed',
                    '4': 'Status 4 – No known protection mandate'
                },
                defaultColor: '#999999', defaultLabel: 'Unknown'
            },
            'PADUS_Public_Access': {
                styleField: 'Access',
                colors: { 'OA': '#4DAC26', 'RA': '#F1A340', 'XA': '#D7191C', 'UK': '#AAAAAA' },
                labels: {
                    'OA': 'Open Access', 'RA': 'Restricted Access',
                    'XA': 'Closed – No Public Access', 'UK': 'Unknown'
                },
                defaultColor: '#AAAAAA', defaultLabel: 'Unknown'
            },
            'Fee_Managers_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'BLM':  '#D4AC0D', 'USFS': '#2D6A4F', 'NPS':  '#52B788',
                    'FWS':  '#74C69D', 'USBR': '#457B9D', 'BIA':  '#A0522D',
                    'DOD':  '#6C757D', 'ARMY': '#4B5320', 'NAVY': '#000080',
                    'USAF': '#4169E1', 'DOE':  '#E76F51'
                },
                labels: {
                    'BLM':  'Bureau of Land Mgmt', 'USFS': 'US Forest Service',
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USBR': 'Bureau of Reclamation', 'BIA': 'Bureau of Indian Affairs',
                    'DOD':  'Dept of Defense', 'ARMY': 'US Army',
                    'NAVY': 'US Navy', 'USAF': 'US Air Force', 'DOE': 'Dept of Energy'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other'
            },
            'Manager_Type_PADUS': {
                styleField: 'Mang_Type',
                colors: {
                    'FED':  '#2166AC', 'STAT': '#4DAC26', 'LOC':  '#FDAE61',
                    'NGO':  '#9970AB', 'PVT':  '#F0F0F0', 'DIST': '#80CDC1',
                    'JNT':  '#A6611A', 'UNK':  '#CCCCCC'
                },
                labels: {
                    'FED':  'Federal', 'STAT': 'State', 'LOC':  'Local Government',
                    'NGO':  'Non-Governmental Org', 'PVT':  'Private',
                    'DIST': 'Special District', 'JNT':  'Joint', 'UNK':  'Unknown'
                },
                defaultColor: '#CCCCCC', defaultLabel: 'Unknown'
            },
            'Federal_Fee_Managers_Authoritative_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'BLM':  '#D4AC0D', 'USFS': '#2D6A4F', 'NPS':  '#52B788',
                    'FWS':  '#74C69D', 'USBR': '#457B9D', 'BIA':  '#A0522D',
                    'DOD':  '#6C757D', 'ARMY': '#4B5320', 'NAVY': '#000080',
                    'USAF': '#4169E1', 'DOE':  '#E76F51', 'EPA':  '#00CED1'
                },
                labels: {
                    'BLM':  'Bureau of Land Mgmt', 'USFS': 'US Forest Service',
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USBR': 'Bureau of Reclamation', 'BIA': 'Bureau of Indian Affairs',
                    'DOD':  'Dept of Defense', 'ARMY': 'US Army',
                    'NAVY': 'US Navy', 'USAF': 'US Air Force',
                    'DOE':  'Dept of Energy', 'EPA':  'EPA'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other Federal'
            },
            'Federal_Management_Agencies_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'BLM':  '#D4AC0D', 'USFS': '#2D6A4F', 'NPS':  '#52B788',
                    'FWS':  '#74C69D', 'USBR': '#457B9D', 'BIA':  '#A0522D',
                    'DOD':  '#6C757D', 'ARMY': '#4B5320', 'NAVY': '#000080',
                    'USAF': '#4169E1', 'DOE':  '#E76F51', 'EPA':  '#00CED1'
                },
                labels: {
                    'BLM':  'Bureau of Land Mgmt', 'USFS': 'US Forest Service',
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USBR': 'Bureau of Reclamation', 'BIA': 'Bureau of Indian Affairs',
                    'DOD':  'Dept of Defense', 'ARMY': 'US Army',
                    'NAVY': 'US Navy', 'USAF': 'US Air Force',
                    'DOE':  'Dept of Energy', 'EPA':  'EPA'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other Federal'
            },
            'Protection_Mechanism_Category_PADUS': {
                styleField: 'Category',
                colors: {
                    'Fee':          '#2B83BA', 'Designation':  '#ABDDA4',
                    'Easement':     '#FDAE61', 'Marine':       '#053061',
                    'Proclamation': '#D7191C'
                },
                labels: {
                    'Fee':          'Fee (Ownership)', 'Designation':  'Designation',
                    'Easement':     'Conservation Easement', 'Marine': 'Marine',
                    'Proclamation': 'Proclamation / Planning'
                },
                defaultColor: '#AAAAAA', defaultLabel: 'Other'
            },
            'Proclamation_and_Other_Planning_Boundaries_PADUS': {
                styleField: 'Mang_Name',
                colors: {
                    'NPS':  '#52B788', 'FWS':  '#74C69D', 'USFS': '#2D6A4F',
                    'DOD':  '#6C757D', 'BLM':  '#D4AC0D', 'USBR': '#457B9D'
                },
                labels: {
                    'NPS':  'National Park Service', 'FWS': 'Fish & Wildlife Service',
                    'USFS': 'US Forest Service', 'DOD': 'Dept of Defense',
                    'BLM':  'Bureau of Land Mgmt', 'USBR': 'Bureau of Reclamation'
                },
                defaultColor: '#ADB5BD', defaultLabel: 'Other'
            }
        };

        var PADUS_SERVICES = {
            'Manager Name':               'Manager_Name_PADUS',
            'Protection Status (GAP)':    'PADUS_Protection_Status_by_GAP_Status_Code',
            'Public Access':              'PADUS_Public_Access',
            'Fee Managers':               'Fee_Managers_PADUS',
            'Manager Type':               'Manager_Type_PADUS',
            'Federal Fee Managers':       'Federal_Fee_Managers_Authoritative_PADUS',
            'Federal Management Agencies':'Federal_Management_Agencies_PADUS',
            'Protection Mechanism':       'Protection_Mechanism_Category_PADUS',
            'Proclamation Boundaries':    'Proclamation_and_Other_Planning_Boundaries_PADUS'
        };

        function createPadusLayer(serviceName) {
            var cfg = PADUS_CONFIG[serviceName] || {};
            var layer = L.esri.featureLayer({
                url: PADUS_BASE + serviceName + '/FeatureServer/0',
                renderer: L.canvas(),
                simplifyFactor: 0.35,
                precision: 5,
                style: function(feature) {
                    var val = cfg.styleField ? feature.properties[cfg.styleField] : null;
                    var color = (cfg.colors && val && cfg.colors[val]) ? cfg.colors[val] : (cfg.defaultColor || '#888888');
                    return { color: '#444', weight: 0.5, fillColor: color, fillOpacity: 0.65 };
                }
            });
            layer.bindPopup(function(l) {
                var p = l.feature.properties;
                var rows = [];
                if (p.Unit_Nm) rows.push('<b>' + p.Unit_Nm + '</b>');
                Object.keys(p).forEach(function(k) {
                    if (k !== 'Unit_Nm' && k !== 'OBJECTID' && p[k] != null && p[k] !== '') {
                        rows.push(k + ': ' + p[k]);
                    }
                });
                return rows.join('<br>') || 'No information available';
            }, { maxWidth: 280 });
            return layer;
        }

        var padusLayer = createPadusLayer('Manager_Name_PADUS');

        function updatePadusLayer() {
            var zoom = map.getZoom();

            if (!padusEnabled || zoom < ZOOM_MIN) {
                if (map.hasLayer(padusLayer)) map.removeLayer(padusLayer);
                return;
            }

            if (!map.hasLayer(padusLayer)) padusLayer.addTo(map);

            if (zoom < ZOOM_COUNTY) {
                padusLayer.setWhere("Mang_Type IN ('FED', 'STAT')");
            } else {
                padusLayer.setWhere("1=1");
            }
        }

        map.on('zoomend', updatePadusLayer);

        function swapPadusLayer(serviceName) {
            if (map.hasLayer(padusLayer)) map.removeLayer(padusLayer);
            padusLayer = createPadusLayer(serviceName);
            updateLegend(serviceName);
            updatePadusLayer();
        }

        function updateLegend(serviceName) {
            var cfg = PADUS_CONFIG[serviceName];
            var el = document.getElementById('sidebarLegend');
            if (!cfg || !cfg.colors) { el.innerHTML = ''; return; }
            var html = '<span class="legend-field">' + cfg.styleField + '</span>';
            Object.keys(cfg.colors).forEach(function(val) {
                html += '<div><i style="background:' + cfg.colors[val] + '"></i>' + (cfg.labels[val] || val) + '</div>';
            });
            if (cfg.defaultLabel) {
                html += '<div><i style="background:' + cfg.defaultColor + '"></i>' + cfg.defaultLabel + '</div>';
            }
            el.innerHTML = html;
        }

        // Populate PAD-US select
        var padusSelect = document.getElementById('padusSelect');
        Object.keys(PADUS_SERVICES).forEach(function(name) {
            var opt = document.createElement('option');
            opt.value = PADUS_SERVICES[name];
            opt.textContent = name;
            padusSelect.appendChild(opt);
        });

        padusSelect.addEventListener('change', function() {
            swapPadusLayer(padusSelect.value);
        });

        document.getElementById('padusCheck').addEventListener('change', function() {
            padusEnabled = this.checked;
            padusSelect.disabled = !padusEnabled;
            updatePadusLayer();
        });

        padusSelect.disabled = true;
        updatePadusLayer();
        updateLegend('Manager_Name_PADUS');

        // --- Trout Streams layer ---
        var troutData = null;
        var troutLayer = null;
        var troutEnabled = false;

        var TROUT_COLORS = {
            'CLASS I':   '#1a6faf',
            'CLASS II':  '#4dac26',
            'CLASS III': '#f1a340'
        };

        function buildTroutLayer(data) {
            return L.geoJSON(data, {
                renderer: L.canvas(),
                style: function(feature) {
                    var cls = feature.properties.TROUT_CLASS_CODE;
                    return { color: TROUT_COLORS[cls] || '#888888', weight: 1.5, opacity: 0.85 };
                },
                onEachFeature: function(feature, layer) {
                    var p = feature.properties;
                    var html = '<b>' + (p.OFFICIAL_NAME || 'Unnamed') + '</b><br>'
                        + 'Class: ' + (p.TROUT_CLASS_CODE || '—') + '<br>'
                        + 'Type: ' + (p.WATER_TYPE || '—');
                    if (p.IMPAIRED_WATER_LISTED_FLAG === 'Y') html += '<br><span style="color:#c0392b">&#9888; Impaired water</span>';
                    if (p.ORW_ERW) html += '<br>ORW/ERW: ' + p.ORW_ERW;
                    layer.bindPopup(html, { maxWidth: 260 });
                }
            });
        }

        function updateTroutLayer() {
            var zoom = map.getZoom();
            if (!troutEnabled || zoom < ZOOM_MIN) {
                if (troutLayer && map.hasLayer(troutLayer)) map.removeLayer(troutLayer);
                return;
            }
            if (troutLayer) {
                if (!map.hasLayer(troutLayer)) troutLayer.addTo(map);
                return;
            }
            if (troutData) {
                troutLayer = buildTroutLayer(troutData);
                troutLayer.addTo(map);
                return;
            }
            fetch('data/trout_streams.geojson')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    troutData = data;
                    if (troutEnabled && map.getZoom() >= ZOOM_MIN) {
                        troutLayer = buildTroutLayer(troutData);
                        troutLayer.addTo(map);
                    }
                });
        }

        document.getElementById('troutCheck').addEventListener('change', function() {
            troutEnabled = this.checked;
            document.getElementById('troutLegend').style.display = troutEnabled ? 'block' : 'none';
            updateTroutLayer();
        });

        map.on('zoomend', updateTroutLayer);

        // --- GPS "Find Me" control ---
        var locateMarker = null;
        var locateCircle = null;

        L.Control.Locate = L.Control.extend({
            onAdd: function() {
                var btn = L.DomUtil.create('button', 'locate-btn');
                btn.title = 'Find my location';
                btn.innerHTML = '&#8982;';
                btn.setAttribute('aria-label', 'Find my location');
                L.DomEvent.disableClickPropagation(btn);
                L.DomEvent.on(btn, 'click', function() {
                    if (!navigator.geolocation) {
                        alert('Geolocation is not supported by your browser.');
                        return;
                    }
                    btn.style.opacity = '0.5';
                    navigator.geolocation.getCurrentPosition(
                        function(pos) {
                            btn.style.opacity = '1';
                            var lat = pos.coords.latitude;
                            var lng = pos.coords.longitude;
                            var acc = pos.coords.accuracy;
                            if (locateMarker) map.removeLayer(locateMarker);
                            if (locateCircle) map.removeLayer(locateCircle);
                            locateCircle = L.circle([lat, lng], { radius: acc, color: '#1a73e8', weight: 1, fillOpacity: 0.1 }).addTo(map);
                            locateMarker = L.circleMarker([lat, lng], { radius: 8, color: '#1a73e8', fillColor: '#1a73e8', fillOpacity: 1, weight: 2 }).addTo(map);
                            map.flyTo([lat, lng], Math.max(map.getZoom(), 12));
                        },
                        function(err) {
                            btn.style.opacity = '1';
                            var msg = { 1: 'Location access denied.', 2: 'Location unavailable.', 3: 'Location request timed out.' };
                            alert(msg[err.code] || 'Could not get location.');
                        },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                });
                return btn;
            }
        });
        new L.Control.Locate({ position: 'bottomright' }).addTo(map);

        // --- Location search ---
        var searchMarker = null;
        var latLngRe = /^\s*(-?\d+\.?\d*)\s*[,\s]+\s*(-?\d+\.?\d*)\s*$/;

        function flyToLatLng(lat, lng, zoom) {
            if (searchMarker) map.removeLayer(searchMarker);
            searchMarker = L.marker([lat, lng]).addTo(map);
            map.flyTo([lat, lng], zoom || 13);
        }

        function showSearchResults(results) {
            var el = document.getElementById('searchResults');
            if (!results.length) {
                el.innerHTML = '<div class="search-no-results">No results found.</div>';
                return;
            }
            if (results.length === 1) {
                el.innerHTML = '';
                flyToLatLng(parseFloat(results[0].lat), parseFloat(results[0].lon));
                return;
            }
            el.innerHTML = '';
            results.forEach(function(r) {
                var item = document.createElement('div');
                item.className = 'search-result-item';
                item.textContent = r.display_name;
                item.addEventListener('click', function() {
                    el.innerHTML = '';
                    flyToLatLng(parseFloat(r.lat), parseFloat(r.lon));
                });
                el.appendChild(item);
            });
        }

        function doSearch() {
            var q = document.getElementById('searchInput').value.trim();
            if (!q) return;

            var el = document.getElementById('searchResults');
            el.innerHTML = '';

            // Try lat/lng first
            var m = latLngRe.exec(q);
            if (m) {
                flyToLatLng(parseFloat(m[1]), parseFloat(m[2]));
                return;
            }

            // Nominatim geocode
            var btn = document.getElementById('searchBtn');
            btn.disabled = true;
            fetch('https://nominatim.openstreetmap.org/search?format=json&limit=5&q=' + encodeURIComponent(q))
                .then(function(r) { return r.json(); })
                .then(function(data) { showSearchResults(data); })
                .catch(function() {
                    el.innerHTML = '<div class="search-no-results">Search failed. Check your connection.</div>';
                })
                .finally(function() { btn.disabled = false; });
        }

        document.getElementById('searchBtn').addEventListener('click', doSearch);
        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doSearch();
        });
        map.on('click', function() {
            document.getElementById('searchResults').innerHTML = '';
        });

        // --- Sidebar open/close ---
        var sidebar = document.getElementById('sidebar');

        document.getElementById('sidebarCloseBtn').addEventListener('click', function() {
            sidebar.classList.remove('open');
            document.body.classList.add('sidebar-closed');
            map.invalidateSize();
        });

        document.getElementById('sidebarOpenBtn').addEventListener('click', function() {
            sidebar.classList.add('open');
            document.body.classList.remove('sidebar-closed');
            map.invalidateSize();
        });

        // Close sidebar by default on mobile
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('open');
            document.body.classList.add('sidebar-closed');
        }
    </script>
</body>
</html>
